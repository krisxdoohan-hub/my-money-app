<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡易記帳本</title>
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .page-hidden { display: none !important; }
        .page-active { display: block; }
        .flex-active { display: flex; }
        body.overview-mode { overflow: hidden; }
        .cell-note { min-width: 100px; max-width: 120px; }
        .cell-amount { min-width: 100px; }
        body { 
            overscroll-behavior-y: none; 
            -webkit-overflow-scrolling: touch;
        }
        .clickable-cell { cursor: pointer; transition: background-color 0.2s; }
        .clickable-cell:active { background-color: #e0e7ff; }
        
        /* 載入動畫 */
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; width: 20px; height: 20px; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* UX 強制顯示實體捲軸 */
        .force-scrollbar::-webkit-scrollbar { width: 6px; }
        .force-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .force-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .force-scrollbar { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
    </style>
</head>
<body id="body-tag" class="bg-gray-200 text-gray-800 font-sans antialiased min-h-[100dvh] flex flex-col items-center">

    <div id="loading-overlay" class="fixed inset-0 bg-indigo-900 bg-opacity-80 z-[100] hidden flex-col justify-center items-center text-white backdrop-blur-sm">
        <div class="spinner mb-4 w-10 h-10 border-4"></div>
        <p id="loading-text" class="font-bold tracking-wider">處理中...</p>
    </div>

    <div id="main-container" class="w-full bg-white h-[100dvh] shadow-lg flex flex-col relative transition-all duration-300">
        
        <header class="bg-indigo-700 text-white p-3 md:p-4 landscape:py-1 landscape:px-3 shadow-md z-40 flex-shrink-0 flex justify-between items-center relative transition-all">
            <h1 class="text-xl landscape:text-base font-bold tracking-wider flex items-center gap-2" id="app-title">
                <i class="ph ph-wallet"></i> 簡易記帳本
            </h1>
            
            <div class="flex items-center gap-3 landscape:gap-2">
                <button onclick="forceSyncUpload()" id="cloud-status-icon" class="text-indigo-300 hover:text-white transition-all bg-indigo-800/50 p-1.5 rounded-full border border-indigo-500/50 shadow-sm active:scale-90" title="點擊手動同步至雲端">
                    <i class="ph ph-cloud-arrow-up text-2xl landscape:text-xl"></i>
                </button>
                
                <nav id="top-nav" class="hidden sm:flex landscape:flex gap-1 bg-indigo-800 p-1 landscape:p-0.5 rounded-lg shadow-inner border border-indigo-600">
                    <button onclick="switchTab('add')" id="top-tab-add" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition bg-white text-indigo-800 shadow-sm flex items-center gap-1">
                        <i class="ph ph-plus-circle text-lg landscape:text-base"></i> 記帳
                    </button>
                    <button onclick="switchTab('overview')" id="top-tab-overview" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition text-indigo-100 hover:bg-indigo-600 hover:text-white flex items-center gap-1">
                        <i class="ph ph-table text-lg landscape:text-base"></i> 報表
                    </button>
                    <button onclick="switchTab('annual')" id="top-tab-annual" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition text-indigo-100 hover:bg-indigo-600 hover:text-white flex items-center gap-1">
                        <i class="ph ph-chart-bar text-lg landscape:text-base"></i> 總覽
                    </button>
                </nav>
            </div>
        </header>

        <main id="page-add" class="page-active flex-1 overflow-y-auto p-4 sm:p-6 pb-24 sm:pb-6 landscape:pb-6 relative bg-gray-50">
            <section class="space-y-6 landscape:space-y-4 max-w-2xl mx-auto w-full md:mt-4 p-6 landscape:p-4 bg-white border border-gray-200 shadow-sm rounded-2xl">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                    <input type="date" id="input-date" class="w-full border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">類別</label>
                    <div class="flex gap-2">
                        <select id="input-category-main" onchange="updateSubCategories()" class="w-1/2 border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-gray-800">
                            <option value="餐點">🍳 餐點</option>
                            <option value="交通">🚗 交通</option>
                            <option value="娛樂">娛樂</option>
                            <option value="生活雜物購買">生活雜物</option>
                            <option value="其他">其他</option>
                        </select>
                        <select id="input-category-sub" class="w-1/2 border-gray-300 rounded-lg p-3 landscape:p-2 bg-indigo-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-indigo-700"></select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">備註 (細項標示)</label>
                    <input type="text" id="input-note" placeholder="例如：購買早餐、文書用具..." class="w-full border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">幣別與金額</label>
                    <div class="flex gap-2">
                        <select id="input-currency" class="w-1/3 border-gray-300 rounded-lg p-3 landscape:p-2 bg-indigo-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-indigo-700">
                            <option value="TWD">TWD</option>
                            <option value="JPY">JPY</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="KRW">KRW</option>
                            <option value="CNY">CNY</option>
                            <option value="HKD">HKD</option>
                        </select>
                        <input type="number" id="input-amount" placeholder="0" onwheel="this.blur()" class="w-2/3 border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-lg font-semibold">
                    </div>
                </div>
                
                <div class="space-y-3 pt-2">
                    <button id="btn-save" onclick="saveRecord()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md active:transform active:scale-95 flex justify-center items-center gap-2">
                        <i class="ph ph-floppy-disk text-xl"></i> 儲存紀錄
                    </button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm active:transform active:scale-95 flex justify-center items-center gap-2">
                        取消修改

                </div>

                <div id="toast-msg" class="text-center text-sm text-green-600 font-medium opacity-0 transition-opacity duration-300">已儲存！</div>
                <div class="text-center text-xs text-gray-400 mt-4 mb-2">系統版本：v2.5.0 (精準控管版)</div>
            </section>
        </main>

        <main id="page-overview" class="page-hidden flex-col landscape:flex-row md:flex-row flex-1 overflow-hidden w-full pb-24 sm:pb-0 landscape:pb-0 bg-white relative">
            <aside class="w-full landscape:w-56 md:w-64 lg:w-80 flex-shrink-0 bg-gray-50 border-b landscape:border-b-0 landscape:border-r md:border-r border-gray-300 p-2 md:p-4 landscape:p-2 flex flex-col gap-2 z-10 shadow-sm">
                <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between gap-2 flex-shrink-0">
                    <h2 class="text-sm font-bold text-gray-800 hidden md:block landscape:block whitespace-nowrap">年月</h2>
                    <input type="month" id="month-selector" onchange="changeMonth()" class="w-full border-gray-300 rounded-md p-1.5 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-center font-bold text-indigo-900">
                </div>
                <button onclick="toggleSummary()" class="flex-shrink-0 md:hidden landscape:hidden w-full bg-indigo-100 text-indigo-800 font-bold py-2 px-4 rounded-lg shadow-sm border border-indigo-200 flex items-center justify-center gap-2">
                    <i class="ph ph-caret-down text-xl" id="summary-toggle-icon"></i>
                    <span id="summary-toggle-text">展開本月統計</span>
                </button>
                <div id="summary-content" class="hidden md:flex landscape:flex bg-white rounded-lg shadow-sm border border-indigo-800 overflow-hidden flex-col landscape:flex-1 md:flex-1 min-h-0">
                    <div class="bg-indigo-800 text-white text-center py-1.5 text-sm font-bold tracking-wider flex-shrink-0 z-20">本月生活費</div>
                    <div id="summary-category-container" class="bg-white overflow-y-auto force-scrollbar flex-1 max-h-[40vh] md:max-h-none landscape:max-h-none relative"></div>
                </div>
            </aside>
            <div id="table-scroll-container" class="flex-1 overflow-auto bg-gray-100 relative cursor-grab force-scrollbar">
                <table class="border-collapse w-max min-w-full text-sm bg-white">
                    <thead id="sheet-thead" class="bg-white"></thead>
                    <tbody id="sheet-tbody" class="divide-y divide-gray-300"></tbody>
                </table>
            </div>
        </main>

        <main id="page-annual" class="page-hidden flex-1 overflow-y-auto p-4 sm:p-6 pb-24 sm:pb-6 landscape:pb-6 relative bg-gray-100 force-scrollbar">
            <div class="flex flex-col gap-4 landscape:grid landscape:grid-cols-2 lg:grid lg:grid-cols-2 max-w-7xl mx-auto w-full">
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3 landscape:col-span-2 lg:col-span-2">
                    <div class="flex items-center justify-between">
                        <button onclick="changeAnnualYear(-1)" class="p-2 text-indigo-600 hover:bg-indigo-100 rounded-full transition"><i class="ph ph-caret-left text-xl"></i></button>
                        <div class="text-center">
                            <span class="text-sm text-gray-500 font-medium">年度圖表分析</span>
                            <h2 id="display-annual-year" class="text-2xl font-bold text-indigo-900">2026 年</h2>
                        </div>
                        <button onclick="changeAnnualYear(1)" class="p-2 text-indigo-600 hover:bg-indigo-100 rounded-full transition"><i class="ph ph-caret-right text-xl"></i></button>
                    </div>
                    <div class="flex items-center justify-center gap-2 pt-2 border-t border-gray-100">
                        <label class="text-sm font-bold text-gray-700">分析幣別：</label>
                        <select id="annual-currency-filter" onchange="updateAnnualOverview()" class="p-1 border border-indigo-200 rounded text-sm font-bold text-indigo-700 bg-indigo-50 focus:outline-none">
                            <option value="TWD">TWD</option>
                        </select>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-xl p-6 text-white shadow-md text-center relative overflow-hidden landscape:col-span-2 lg:col-span-2 flex-shrink-0">
                    <p class="text-indigo-100 text-sm mb-1">本年度累計總支出</p>
                    <div class="flex justify-center items-end gap-1">
                        <span id="annual-total-currency" class="text-xl font-medium mb-1">TWD</span>
                        <p id="annual-total-expense" class="text-4xl font-bold tracking-wider">0</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden landscape:col-span-1 lg:col-span-1 flex flex-col h-full min-h-[300px]">
                    <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex justify-between items-center flex-shrink-0 z-10">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-pie-chart text-indigo-600 text-lg"></i> <span id="annual-cat-title">全年度類別統計</span></h3>
                        <button id="btn-reset-annual" onclick="resetAnnualCategory()" class="hidden text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full hover:bg-indigo-200 transition font-bold shadow-sm active:scale-95">返回全年</button>
                    </div>
                    <div class="p-4 flex-1 overflow-y-auto force-scrollbar min-h-0 relative"><div id="annual-category-list" class="space-y-4"></div></div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden landscape:col-span-1 lg:col-span-1 flex flex-col h-full min-h-[300px]">
                    <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex-shrink-0 z-10">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-trend-up text-indigo-600 text-lg"></i> 各月支出明細 <span class="text-xs text-gray-500 font-normal ml-1">(點擊連動)</span></h3>
                    </div>
                    <div class="flex-1 overflow-y-auto force-scrollbar min-h-0 relative"><table class="w-full text-sm text-left"><tbody id="annual-monthly-tbody" class="divide-y divide-gray-100"></tbody></table></div>
                </div>

                <div class="bg-blue-50 rounded-xl shadow-sm border border-blue-200 p-4 landscape:col-span-2 lg:col-span-2">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-blue-900 flex items-center gap-2"><i class="ph ph-cloud-arrow-up text-blue-600 text-xl"></i> 雲端同步設定</h3>
                        <button onclick="toggleCloudConfigVisibility()" class="text-blue-600 hover:bg-blue-200 p-1.5 rounded-full transition flex items-center justify-center shadow-sm bg-white"><i class="ph ph-eye-slash text-xl" id="icon-visibility"></i></button>
                    </div>
                    <p class="text-xs text-blue-700 mb-3 leading-relaxed">請輸入您的 GitHub 金鑰以啟用自動同步。您的金鑰僅會保存在此裝置，不會外洩。</p>
                    <div class="space-y-3 mb-4 max-w-2xl mx-auto">
                        <div class="flex gap-2">
                            <input type="password" id="cfg-owner" value="krisxdoohan-hub" placeholder="GitHub 帳號" class="w-1/2 border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                            <input type="password" id="cfg-repo" value="my-money-app" placeholder="專案名稱" class="w-1/2 border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                        </div>
                        <input type="password" id="cfg-token" placeholder="請貼上您的 GitHub Token (ghp_...)" class="w-full border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                        <button onclick="saveCloudConfig()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-sm">儲存金鑰設定</button>
                    </div>
                    <div class="flex gap-2 border-t border-blue-200 pt-4 max-w-2xl mx-auto">
                        <button onclick="forceSyncDownload()" class="flex-1 bg-white hover:bg-blue-100 text-blue-700 font-bold border border-blue-300 py-2 px-2 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-xs">⬇️ 從雲端下載</button>
                        <button onclick="forceSyncUpload()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-2 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-xs">⬆️ 強制覆蓋雲端</button>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-xl shadow-sm border border-gray-200 p-4 landscape:col-span-2 lg:col-span-2 flex-shrink-0">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2 mb-3"><i class="ph ph-hard-drives text-gray-500 text-lg"></i> 本機手動備份</h3>
                    <div class="flex gap-2 max-w-2xl mx-auto">
                        <button onclick="exportData()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-3 rounded-lg transition text-sm">匯出 JSON</button>
                        <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
                        <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-white hover:bg-gray-100 text-gray-700 font-bold border border-gray-300 py-2 px-3 rounded-lg transition text-sm">匯入 JSON</button>
                    </div>
                    <div id="backup-msg" class="text-center text-sm font-medium opacity-0 transition-opacity duration-300 mt-2"></div>
                </div>
            </div>
        </main>

        <nav id="bottom-nav" class="sm:hidden landscape:hidden absolute bottom-0 w-full bg-white border-t border-gray-300 flex text-center cursor-pointer shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-40 flex-shrink-0">
            <div onclick="switchTab('add')" id="bottom-tab-add" class="flex-1 py-3 text-indigo-600 font-medium border-b-4 border-indigo-600 flex flex-col items-center transition bg-white"><i class="ph ph-plus-circle text-2xl mb-1"></i><span class="text-xs" id="bottom-tab-add-text">記帳</span></div>
            <div onclick="switchTab('overview')" id="bottom-tab-overview" class="flex-1 py-3 text-gray-400 font-medium border-b-4 border-transparent hover:text-indigo-500 flex flex-col items-center transition bg-white"><i class="ph ph-table text-2xl mb-1"></i><span class="text-xs">Excel報表</span></div>
            <div onclick="switchTab('annual')" id="bottom-tab-annual" class="flex-1 py-3 text-gray-400 font-medium border-b-4 border-transparent hover:text-indigo-500 flex flex-col items-center transition bg-white"><i class="ph ph-chart-bar text-2xl mb-1"></i><span class="text-xs">年度總覽</span></div>
        </nav>

        <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4 transition-opacity">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-100 transition-transform">
                <div class="bg-indigo-50 p-4 border-b border-indigo-100"><h3 class="text-lg font-bold text-indigo-900 text-center">紀錄選項</h3></div>
                <div class="p-6 space-y-4">
                    <div class="text-center text-gray-600 text-sm mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <span id="modal-info-cat" class="font-bold text-gray-800"></span> - <span id="modal-info-note"></span> <br>
                        <span id="modal-info-amount" class="text-lg font-bold text-indigo-600 block mt-1"></span>
                    </div>
                    <button onclick="executeEdit()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2">編輯此紀錄</button>
                    <button onclick="executeDelete()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2">刪除此紀錄</button>
                    <button onclick="closeModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg mt-2">取消</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }

        let records = [];
        let currentViewDate = new Date();
        let currentAnnualYear = new Date().getFullYear();
        let isDraggingTable = false; 
        let editingRecordId = null;
        let selectedRecordForModal = null; 
        
        let cloudConfig = {
            owner: 'krisxdoohan-hub',
            repo: 'my-money-app',
            token: '',
            path: 'data.json',
            lastSha: null
        };

        const categoryMap = {
            '餐點': ['早餐', '午餐', '晚餐', '飲品', '其他'],
            '交通': ['加油', '車票', '其他'],
            '娛樂': [],
            '生活雜物購買': [],
            '其他': []
        };

        const categoriesList = [
            '餐點-早餐', '餐點-午餐', '餐點-晚餐', '餐點-飲品', '餐點-其他', 
            '交通-加油', '交通-車票', '交通-其他', '娛樂', '生活雜物購買', '其他'
        ];

        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').classList.replace('hidden', 'flex');
        }
        function hideLoading() {
            document.getElementById('loading-overlay').classList.replace('flex', 'hidden');
        }

        function toggleCloudConfigVisibility() {
            const ownerInput = document.getElementById('cfg-owner');
            const repoInput = document.getElementById('cfg-repo');
            const tokenInput = document.getElementById('cfg-token');
            const icon = document.getElementById('icon-visibility');
            if (tokenInput.type === 'password') {
                ownerInput.type = 'text'; repoInput.type = 'text'; tokenInput.type = 'text';
                icon.classList.replace('ph-eye-slash', 'ph-eye'); 
                icon.parentElement.classList.replace('text-blue-600', 'text-yellow-600'); 
            } else {
                ownerInput.type = 'password'; repoInput.type = 'password'; tokenInput.type = 'password';
                icon.classList.replace('ph-eye', 'ph-eye-slash'); 
                icon.parentElement.classList.replace('text-yellow-600', 'text-blue-600');
            }
        }

        function updateCloudIcon(status) {
            const iconBtn = document.getElementById('cloud-status-icon');
            if (status === 'success') {
                iconBtn.innerHTML = '<i class="ph ph-cloud-check text-2xl landscape:text-xl"></i>';
                iconBtn.className = "text-green-300 bg-green-900/30 p-1.5 rounded-full border border-green-500/50 shadow-sm active:scale-90";
                iconBtn.title = "雲端同步成功";
            } else if (status === 'warning') {
                iconBtn.innerHTML = '<i class="ph ph-cloud-warning text-2xl landscape:text-xl"></i>';
                iconBtn.className = "text-red-300 bg-red-900/30 p-1.5 rounded-full border border-red-500/50 shadow-sm active:scale-90";
                iconBtn.title = "有未上傳的變動";
            } else if (status === 'loading') {
                iconBtn.innerHTML = '<div class="spinner w-5 h-5 border-2"></div>';
            } else {
                iconBtn.innerHTML = '<i class="ph ph-cloud-slash text-2xl landscape:text-xl"></i>';

        async function fetchGitHubData() {
            if (!cloudConfig.token) return null;
            const url = `https://api.github.com/repos/${cloudConfig.owner}/${cloudConfig.repo}/contents/${cloudConfig.path}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${cloudConfig.token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (res.status === 404) return { isNew: true }; 
                if (!res.ok) throw new Error(`API 錯誤: ${res.status}`);
                const data = await res.json();
                cloudConfig.lastSha = data.sha; 
                localStorage.setItem('moneyAppCloudConfig', JSON.stringify(cloudConfig));
                const contentStr = b64_to_utf8(data.content);
                return { isNew: false, records: JSON.parse(contentStr) };
            } catch (err) { return { error: err.message }; }
        }

        async function putGitHubData() {
            if (!cloudConfig.token) return false;
            const url = `https://api.github.com/repos/${cloudConfig.owner}/${cloudConfig.repo}/contents/${cloudConfig.path}`;
            const currentData = await fetchGitHubData();
            const payload = { message: `Manual sync from App: ${new Date().toLocaleString()}`, content: utf8_to_b64(JSON.stringify(records)), sha: cloudConfig.lastSha };
            try {
                const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${cloudConfig.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(`上傳失敗: ${res.status}`);
                const data = await res.json();
                cloudConfig.lastSha = data.content.sha; 
                localStorage.setItem('moneyAppCloudConfig', JSON.stringify(cloudConfig));
                updateCloudIcon('success');
                return true;
            } catch (err) { updateCloudIcon('warning'); return false; }
        }

        function setupTableScroll() {
            const slider = document.getElementById('table-scroll-container');
            if(!slider) return;
            let isDown = false, startX, scrollLeft, startY, scrollTop;
            slider.addEventListener('mousedown', (e) => {
                isDown = true; isDraggingTable = false; 
                slider.classList.add('cursor-grabbing');
                startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
                scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return; 
                e.preventDefault(); 
                const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop;
                const walkX = (x - startX) * 1.5; const walkY = (y - startY) * 1.5;
                if (Math.abs(walkX) > 5 || Math.abs(walkY) > 5) isDraggingTable = true;
                slider.scrollLeft = scrollLeft - walkX; slider.scrollTop = scrollTop - walkY;
            });
        }

                    if (subCats.length > 0) {
                        cHtml += `<div class="pl-3 space-y-3 border-l-2 border-indigo-100 ml-1">`;
                        subCats.forEach(sub => { const sAmt = sTots[sub]; if (sAmt > 0) { const sPct = dispTot === 0 ? 0 : ((sAmt / dispTot) * 100).toFixed(1); cHtml += `<div class="pl-2"><div class="flex justify-between text-xs font-medium text-gray-600 mb-1"><span>${sub} (${sPct}%)</span><span>${sAmt.toLocaleString()}</span></div><div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-indigo-300 h-1.5 rounded-full" style="width: ${sPct}%"></div></div></div>`; } });
                        cHtml += `</div>`;
                    }
                    cHtml += `</div>`;
                }
            }
            listDiv.innerHTML = cHtml || `<div class="text-center text-gray-400 py-6">尚無紀錄</div>`;
        }

        function renderAnnualMonthlyTable(monTots, activeCurr) {
            const tbody = document.getElementById('annual-monthly-tbody'); let mHtml = ''; const maxExp = Math.max(...monTots, 1);
            for (let i = 0; i < 12; i++) {
                const amt = monTots[i], pct = Math.round((amt / maxExp) * 100), isS = selectedAnnualMonth === i, bg = isS ? 'bg-indigo-100/50' : 'hover:bg-gray-50'; 
                mHtml += `<tr onclick="selectAnnualMonth(${i})" class="cursor-pointer transition-colors ${bg}"><td class="px-4 py-3 border-r border-gray-100 font-bold ${isS ? 'text-indigo-700' : 'text-gray-600'} w-16 text-center">${i + 1}月</td><td class="px-4 py-3 relative"><div class="absolute inset-y-0 left-0 bg-indigo-50 border-l-4 ${isS ? 'border-indigo-600' : 'border-indigo-400'} transition-all" style="width: ${pct}%; opacity: 0.6; margin-top: 4px; margin-bottom: 4px;"></div><div class="relative z-10 flex justify-end font-medium ${amt > 0 ? 'text-indigo-900' : 'text-gray-400'}">${amt.toLocaleString()}</div></td></tr>`;
            }
            tbody.innerHTML = mHtml;
        }

        function selectAnnualMonth(idx) { selectedAnnualMonth = idx; updateAnnualOverview(); }
        function resetAnnualCategory() { selectedAnnualMonth = null; updateAnnualOverview(); }
        function showBackupMessage(msg, isS = true) { const div = document.getElementById('backup-msg'); div.innerText = msg; div.className = `text-center text-sm font-medium transition-opacity duration-300 mt-2 ${isS ? 'text-green-600' : 'text-red-600'}`; div.style.opacity = '1'; setTimeout(() => { div.style.opacity = '0'; }, 3000); }

        function exportData() { if (records.length === 0) { showBackupMessage("無紀錄可備份！", false); return; } try { const uri = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(records)), link = document.createElement('a'); link.setAttribute('href', uri); link.setAttribute('download', `記帳備份_${getLocalYMD(new Date())}.json`); document.body.appendChild(link); link.click(); document.body.removeChild(link); showBackupMessage("已匯出！"); } catch (e) { showBackupMessage("匯出失敗。", false); } }
        function importData(ev) { const file = ev.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async function(e) { try { const data = JSON.parse(e.target.result); if (Array.isArray(data)) { records = data; records.forEach(r => { if(!r.currency) r.currency = 'TWD'; if(r.category === '餐點') r.category = '餐點-其他'; if(r.category === '交通') r.category = '交通-其他'; }); localStorage.setItem('expenseRecords', JSON.stringify(records)); showBackupMessage("已還原！"); updateCurrencyFilterOptions(); updateAnnualOverview(); updateCloudIcon('warning'); } else { showBackupMessage("格式錯誤。", false); } } catch(e) { showBackupMessage("讀取失敗。", false); } ev.target.value = ''; }; reader.readAsText(file); }

        window.onload = init;
    </script>
</body>
</html>
