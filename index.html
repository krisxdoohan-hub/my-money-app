<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>簡易記帳本</title>
    <!-- 【雙軌並行關鍵】加入 PWA 身分證綁定 -->
    <link rel="manifest" href="./manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .page-hidden { display: none !important; }
        .page-active { display: block; }
        .flex-active { display: flex; }
        /* 報表模式防止 body 滾動，交由內部表格滾動 */
        body.overview-mode { overflow: hidden; }
        .cell-note { min-width: 100px; max-width: 120px; }
        .cell-amount { min-width: 100px; }
        body { 
            overscroll-behavior-y: none; 
            -webkit-overflow-scrolling: touch;
        }
        .clickable-cell { cursor: pointer; transition: background-color 0.2s; }
        .clickable-cell:active { background-color: #e0e7ff; }
        /* 載入動畫 */
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; width: 20px; height: 20px; animation: spin 1s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body id="body-tag" class="bg-gray-200 text-gray-800 font-sans antialiased min-h-[100dvh] flex flex-col items-center">

    <!-- 全域載入遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-indigo-900 bg-opacity-80 z-[100] hidden flex-col justify-center items-center text-white backdrop-blur-sm">
        <div class="spinner mb-4 w-10 h-10 border-4"></div>
        <p id="loading-text" class="font-bold tracking-wider">雲端同步中...</p>
    </div>

    <!-- 解除最大寬度封印，讓橫向畫面完美延展 (w-full) -->
    <div id="main-container" class="w-full bg-white h-[100dvh] shadow-lg flex flex-col relative transition-all duration-300">
        
        <!-- 【極致壓縮】橫向模式時縮小標題列的 padding 與字體 -->
        <header class="bg-indigo-700 text-white p-3 md:p-4 landscape:py-1 landscape:px-3 shadow-md z-40 flex-shrink-0 flex justify-between items-center relative transition-all">
            <h1 class="text-xl landscape:text-base font-bold tracking-wider flex items-center gap-2" id="app-title">
                <i class="ph ph-wallet"></i> 簡易記帳本
            </h1>
            
            <div class="flex items-center gap-3 landscape:gap-2">
                <!-- 雲端狀態 -->
                <div id="cloud-status-icon" class="text-indigo-300 transition-colors" title="雲端未連線">
                    <i class="ph ph-cloud-slash text-2xl landscape:text-xl"></i>
                </div>
                
                <!-- 【智慧雙態導覽列】(電腦版 / 手機橫向時顯示於右上角) -->
                <nav id="top-nav" class="hidden sm:flex landscape:flex gap-1 bg-indigo-800 p-1 landscape:p-0.5 rounded-lg shadow-inner border border-indigo-600">
                    <button onclick="switchTab('add')" id="top-tab-add" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition bg-white text-indigo-800 shadow-sm flex items-center gap-1 active:scale-95">
                        <i class="ph ph-plus-circle text-lg landscape:text-base"></i> 記帳
                    </button>
                    <button onclick="switchTab('overview')" id="top-tab-overview" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition text-indigo-100 hover:bg-indigo-600 hover:text-white flex items-center gap-1 active:scale-95">
                        <i class="ph ph-table text-lg landscape:text-base"></i> 報表
                    </button>
                    <button onclick="switchTab('annual')" id="top-tab-annual" class="px-3 py-1.5 landscape:px-2 landscape:py-1 rounded text-sm landscape:text-xs font-bold transition text-indigo-100 hover:bg-indigo-600 hover:text-white flex items-center gap-1 active:scale-95">
                        <i class="ph ph-chart-bar text-lg landscape:text-base"></i> 總覽
                    </button>
                </nav>
            </div>
        </header>

        <!-- 第一頁：新增記帳 -->
        <main id="page-add" class="page-active flex-1 overflow-y-auto p-4 sm:p-6 pb-24 sm:pb-6 landscape:pb-6 relative bg-gray-50">
            <section class="space-y-6 landscape:space-y-4 max-w-2xl mx-auto w-full md:mt-4 p-6 landscape:p-4 bg-white border border-gray-200 shadow-sm rounded-2xl">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">日期</label>
                    <input type="date" id="input-date" class="w-full border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">類別</label>
                    <div class="flex gap-2">
                        <select id="input-category-main" onchange="updateSubCategories()" class="w-1/2 border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-gray-800">
                            <option value="餐點">🍳 餐點</option>
                            <option value="交通">🚗 交通</option>
                            <option value="娛樂">🎮 娛樂</option>
                            <option value="生活雜物購買">🛍️ 生活雜物</option>
                            <option value="其他">📦 其他</option>
                        </select>
                        <select id="input-category-sub" class="w-1/2 border-gray-300 rounded-lg p-3 landscape:p-2 bg-indigo-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-indigo-700">
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">備註 (細項標示)</label>
                    <input type="text" id="input-note" placeholder="例如：購買早餐、文書用具..." class="w-full border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">幣別與金額</label>
                    <div class="flex gap-2">
                        <select id="input-currency" class="w-1/3 border-gray-300 rounded-lg p-3 landscape:p-2 bg-indigo-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold text-indigo-700">
                            <option value="TWD">TWD</option>
                            <option value="JPY">JPY</option>
                            <option value="USD">USD</option>
                            <option value="EUR">EUR</option>
                            <option value="KRW">KRW</option>
                            <option value="CNY">CNY</option>
                            <option value="HKD">HKD</option>
                        </select>
                        <input type="number" id="input-amount" placeholder="0" onwheel="this.blur()" class="w-2/3 border-gray-300 rounded-lg p-3 landscape:p-2 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-lg font-semibold">
                    </div>
                </div>
                
                <div class="space-y-3 pt-2">
                    <button id="btn-save" onclick="saveRecord()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200 shadow-md active:transform active:scale-95 flex justify-center items-center gap-2">
                        <i class="ph ph-floppy-disk text-xl"></i> 儲存紀錄
                    </button>
                    <button id="btn-cancel-edit" onclick="cancelEdit()" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-lg transition duration-200 shadow-sm active:transform active:scale-95 flex justify-center items-center gap-2">
                        取消修改
                    </button>
                </div>

                <div id="toast-msg" class="text-center text-sm text-green-600 font-medium opacity-0 transition-opacity duration-300">
                    已成功儲存！
                </div>
                
                <div class="text-center text-xs text-gray-400 mt-4 mb-2">
                    系統版本：v2.4.0 (比例精確版)
                </div>

            </section>
        </main>

        <!-- 第二頁：總覽表格 (Excel) -->
        <main id="page-overview" class="page-hidden flex-col landscape:flex-row md:flex-row flex-1 overflow-hidden w-full pb-24 sm:pb-0 landscape:pb-0 bg-white relative">
            
            <!-- ✨【比例精確更新】✨ 橫向時，側邊欄固定寬度為精確的 22% (landscape:w-[22%]) -->
            <aside class="w-full landscape:w-[22%] landscape:min-w-[150px] md:w-64 lg:w-80 flex-shrink-0 bg-gray-50 border-b landscape:border-b-0 landscape:border-r md:border-r border-gray-300 p-2 md:p-4 landscape:p-2 overflow-y-auto flex flex-col gap-2 z-10 shadow-sm">
                <div class="bg-white p-2 rounded-lg shadow-sm border border-gray-200 flex items-center justify-between gap-2">
                    <h2 class="text-sm font-bold text-gray-800 hidden md:block landscape:block whitespace-nowrap">年月</h2>
                    <input type="month" id="month-selector" onchange="changeMonth()" class="w-full border-gray-300 rounded-md p-1.5 bg-gray-50 border focus:ring-2 focus:ring-indigo-500 focus:outline-none text-center font-bold text-indigo-900 landscape:text-xs">
                </div>
                
                <button onclick="toggleSummary()" class="md:hidden landscape:hidden w-full bg-indigo-100 text-indigo-800 font-bold py-2 px-4 rounded-lg shadow-sm border border-indigo-200 flex items-center justify-center gap-2 active:bg-indigo-200">
                    <i class="ph ph-caret-down text-xl" id="summary-toggle-icon"></i>
                    <span id="summary-toggle-text">展開本月統計</span>
                </button>
                
                <div id="summary-content" class="hidden md:block landscape:block bg-white rounded-lg shadow-sm border border-indigo-800 overflow-hidden">
                    <div class="bg-indigo-800 text-white text-center py-1.5 text-sm landscape:text-xs font-bold tracking-wider">本月生活費</div>
                    <div id="summary-category-container" class="bg-white"></div>
                </div>
            </aside>

            <!-- 報表區塊自動延展填滿右側 78% 的空間 -->
            <div id="table-scroll-container" class="flex-1 overflow-auto bg-gray-100 relative cursor-grab">
                <table class="border-collapse w-max min-w-full text-sm bg-white">
                    <thead id="sheet-thead" class="bg-white">
                    </thead>
                    <tbody id="sheet-tbody" class="divide-y divide-gray-300">
                    </tbody>
                </table>
            </div>
        </main>

        <!-- 第三頁：年度總覽 -->
        <main id="page-annual" class="page-hidden flex-1 overflow-y-auto p-4 sm:p-6 pb-24 sm:pb-6 landscape:pb-6 relative bg-gray-100">
            <div class="flex flex-col gap-4 landscape:grid landscape:grid-cols-2 lg:grid lg:grid-cols-2 max-w-7xl mx-auto w-full">
                
                <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3 landscape:col-span-2 lg:col-span-2">
                    <div class="flex items-center justify-between">
                        <button onclick="changeAnnualYear(-1)" class="p-2 text-indigo-600 hover:bg-indigo-100 rounded-full transition">
                            <i class="ph ph-caret-left text-xl"></i>
                        </button>
                        <div class="text-center">
                            <span class="text-sm text-gray-500 font-medium">年度圖表分析</span>
                            <h2 id="display-annual-year" class="text-2xl font-bold text-indigo-900">2026 年</h2>
                        </div>
                        <button onclick="changeAnnualYear(1)" class="p-2 text-indigo-600 hover:bg-indigo-100 rounded-full transition">
                            <i class="ph ph-caret-right text-xl"></i>
                        </button>
                    </div>
                    <div class="flex items-center justify-center gap-2 pt-2 border-t border-gray-100">
                        <label class="text-sm font-bold text-gray-700">分析幣別：</label>
                        <select id="annual-currency-filter" onchange="updateAnnualOverview()" class="p-1 border border-indigo-200 rounded text-sm font-bold text-indigo-700 bg-indigo-50 focus:outline-none">
                            <option value="TWD">TWD</option>
                        </select>
                    </div>
                </div>

                <div class="bg-gradient-to-br from-indigo-600 to-purple-700 rounded-xl p-6 text-white shadow-md text-center relative overflow-hidden landscape:col-span-2 lg:col-span-2">
                    <p class="text-indigo-100 text-sm mb-1">本年度累計總支出</p>
                    <div class="flex justify-center items-end gap-1">
                        <span id="annual-total-currency" class="text-xl font-medium mb-1">TWD</span>
                        <p id="annual-total-expense" class="text-4xl font-bold tracking-wider">0</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden landscape:col-span-1 lg:col-span-1 flex flex-col h-full">
                    <div class="bg-gray-100 px-4 py-3 border-b border-gray-200 flex justify-between items-center">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <i class="ph ph-pie-chart text-indigo-600 text-lg"></i> 
                            <span id="annual-cat-title">全年度類別統計</span>
                        </h3>
                        <button id="btn-reset-annual" onclick="resetAnnualCategory()" class="hidden text-xs bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full hover:bg-indigo-200 transition font-bold shadow-sm active:scale-95">返回全年</button>
                    </div>
                    <div class="p-4 flex-1">
                        <div id="annual-category-list" class="space-y-4"></div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden landscape:col-span-1 lg:col-span-1 flex flex-col h-full">
                    <div class="bg-gray-100 px-4 py-3 border-b border-gray-200">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2"><i class="ph ph-trend-up text-indigo-600 text-lg"></i> 各月支出明細 <span class="text-xs text-gray-500 font-normal ml-1">(點擊連動)</span></h3>
                    </div>
                    <div class="flex-1 overflow-y-auto">
                        <table class="w-full text-sm text-left">
                            <tbody id="annual-monthly-tbody" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>

                <!-- ✨ V2.4 雲端同步設定區 (保持隱私保護功能) ✨ -->
                <div class="bg-blue-50 rounded-xl shadow-sm border border-blue-200 p-4 landscape:col-span-2 lg:col-span-2">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-bold text-blue-900 flex items-center gap-2">
                            <i class="ph ph-cloud-arrow-up text-blue-600 text-xl"></i> 雲端同步設定
                        </h3>
                        <button onclick="toggleCloudConfigVisibility()" class="text-blue-600 hover:bg-blue-200 p-1.5 rounded-full transition flex items-center justify-center shadow-sm bg-white" title="顯示/隱藏隱私資訊">
                            <i class="ph ph-eye-slash text-xl" id="icon-visibility"></i>
                        </button>
                    </div>
                    <p class="text-xs text-blue-700 mb-3 leading-relaxed">請輸入您的 GitHub 金鑰以啟用自動同步。您的金鑰僅會保存在此裝置，不會外洩。</p>
                    <div class="space-y-3 mb-4 max-w-2xl mx-auto">
                        <div class="flex gap-2">
                            <input type="password" id="cfg-owner" value="krisxdoohan-hub" placeholder="GitHub 帳號" class="w-1/2 border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                            <input type="password" id="cfg-repo" value="my-money-app" placeholder="專案名稱" class="w-1/2 border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                        </div>
                        <input type="password" id="cfg-token" placeholder="請貼上您的 GitHub Token (ghp_...)" class="w-full border-blue-200 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-mono">
                        <button onclick="saveCloudConfig()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-3 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-sm">
                            <i class="ph ph-floppy-disk text-lg"></i> 儲存金鑰設定
                        </button>
                    </div>
                    <div class="flex gap-2 border-t border-blue-200 pt-4 max-w-2xl mx-auto">
                        <button onclick="forceSyncDownload()" class="flex-1 bg-white hover:bg-blue-100 text-blue-700 font-bold border border-blue-300 py-2 px-2 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-xs">
                            <i class="ph ph-download-simple text-lg"></i> ⬇️ 從雲端下載
                        </button>
                        <button onclick="forceSyncUpload()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-2 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-xs">
                            <i class="ph ph-upload-simple text-lg"></i> ⬆️ 強制覆蓋雲端
                        </button>
                    </div>
                </div>

                <div class="bg-gray-50 rounded-xl shadow-sm border border-gray-200 p-4 landscape:col-span-2 lg:col-span-2">
                    <h3 class="font-bold text-gray-700 flex items-center gap-2 mb-3">
                        <i class="ph ph-hard-drives text-gray-500 text-lg"></i> 本機手動備份
                    </h3>
                    <div class="flex gap-2 max-w-2xl mx-auto">
                        <button onclick="exportData()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-3 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-sm">
                            <i class="ph ph-export text-lg"></i> 匯出 JSON
                        </button>
                        <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
                        <button onclick="document.getElementById('import-file').click()" class="flex-1 bg-white hover:bg-gray-100 text-gray-700 font-bold border border-gray-300 py-2 px-3 rounded-lg flex items-center justify-center gap-1 shadow-sm active:scale-95 transition text-sm">
                            <i class="ph ph-download-simple text-lg"></i> 匯入 JSON
                        </button>
                    </div>
                    <div id="backup-msg" class="text-center text-sm font-medium opacity-0 transition-opacity duration-300 mt-2"></div>
                </div>
            </div>
        </main>

        <!-- 【直立手機專屬】底部導覽列 -->
        <nav id="bottom-nav" class="sm:hidden landscape:hidden absolute bottom-0 w-full bg-white border-t border-gray-300 flex text-center cursor-pointer shadow-[0_-2px_10px_rgba(0,0,0,0.05)] z-40 flex-shrink-0">
            <div onclick="switchTab('add')" id="bottom-tab-add" class="flex-1 py-3 text-indigo-600 font-medium border-b-4 border-indigo-600 flex flex-col items-center transition bg-white">
                <i class="ph ph-plus-circle text-2xl mb-1"></i>
                <span class="text-xs" id="bottom-tab-add-text">記帳</span>
            </div>
            <div onclick="switchTab('overview')" id="bottom-tab-overview" class="flex-1 py-3 text-gray-400 font-medium border-b-4 border-transparent hover:text-indigo-500 flex flex-col items-center transition bg-white">
                <i class="ph ph-table text-2xl mb-1"></i>
                <span class="text-xs">Excel報表</span>
            </div>
            <div onclick="switchTab('annual')" id="bottom-tab-annual" class="flex-1 py-3 text-gray-400 font-medium border-b-4 border-transparent hover:text-indigo-500 flex flex-col items-center transition bg-white">
                <i class="ph ph-chart-bar text-2xl mb-1"></i>
                <span class="text-xs">年度總覽</span>
            </div>
        </nav>

        <!-- 編輯/刪除 操作對話框 -->
        <div id="action-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-center p-4 transition-opacity">
            <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm overflow-hidden transform scale-100 transition-transform">
                <div class="bg-indigo-50 p-4 border-b border-indigo-100">
                    <h3 class="text-lg font-bold text-indigo-900 text-center">紀錄選項</h3>
                </div>
                <div class="p-6 space-y-4">
                    <div class="text-center text-gray-600 text-sm mb-4 bg-gray-50 p-3 rounded-lg border border-gray-200">
                        <span id="modal-info-cat" class="font-bold text-gray-800"></span> - 
                        <span id="modal-info-note"></span> <br>
                        <span id="modal-info-amount" class="text-lg font-bold text-indigo-600 block mt-1"></span>
                    </div>
                    <button onclick="executeEdit()" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 active:scale-95 transition">
                        <i class="ph ph-pencil-simple text-xl"></i> 編輯此紀錄
                    </button>
                    <button onclick="executeDelete()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-4 rounded-lg flex justify-center items-center gap-2 active:scale-95 transition">
                        <i class="ph ph-trash text-xl"></i> 刪除此紀錄
                    </button>
                    <button onclick="closeModal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 px-4 rounded-lg mt-2 active:scale-95 transition">
                        取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            });
        }

        let records = [];
        let currentViewDate = new Date();
        let currentAnnualYear = new Date().getFullYear();
        let isDraggingTable = false; 
        let editingRecordId = null;
        let selectedRecordForModal = null; 
        
        let cloudConfig = {
            owner: 'krisxdoohan-hub',
            repo: 'my-money-app',
            token: '',
            path: 'data.json',
            lastSha: null
        };

        const categoryMap = {
            '餐點': ['早餐', '午餐', '晚餐', '飲品', '其他'],
            '交通': ['加油', '車票', '其他'],
            '娛樂': [],
            '生活雜物購買': [],
            '其他': []
        };

        const categoriesList = [
            '餐點-早餐', '餐點-午餐', '餐點-晚餐', '餐點-飲品', '餐點-其他', 
            '交通-加油', '交通-車票', '交通-其他', '娛樂', '生活雜物購買', '其他'
        ];

        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').classList.replace('hidden', 'flex');
        }
        function hideLoading() {
            document.getElementById('loading-overlay').classList.replace('flex', 'hidden');
        }

        async function fetchGitHubData() {
            if (!cloudConfig.token) return null;
            const url = `https://api.github.com/repos/${cloudConfig.owner}/${cloudConfig.repo}/contents/${cloudConfig.path}`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `token ${cloudConfig.token}`, 'Accept': 'application/vnd.github.v3+json' } });
                if (res.status === 404) return { isNew: true }; 
                if (!res.ok) throw new Error(`API 錯誤: ${res.status}`);
                const data = await res.json();
                cloudConfig.lastSha = data.sha; 
                localStorage.setItem('moneyAppCloudConfig', JSON.stringify(cloudConfig));
                const contentStr = b64_to_utf8(data.content);
                return { isNew: false, records: JSON.parse(contentStr) };
            } catch (err) { return { error: err.message }; }
        }

        async function putGitHubData() {
            if (!cloudConfig.token) return false;
            const url = `https://api.github.com/repos/${cloudConfig.owner}/${cloudConfig.repo}/contents/${cloudConfig.path}`;
            if (!cloudConfig.lastSha) {
                const currentData = await fetchGitHubData();
                if (currentData && currentData.error) return false;
            }
            const payload = { message: `Auto sync from App: ${new Date().toLocaleString()}`, content: utf8_to_b64(JSON.stringify(records)), sha: cloudConfig.lastSha };
            try {
                const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${cloudConfig.token}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if (!res.ok) throw new Error(`上傳失敗: ${res.status}`);
                const data = await res.json();
                cloudConfig.lastSha = data.content.sha; 
                localStorage.setItem('moneyAppCloudConfig', JSON.stringify(cloudConfig));
                updateCloudIcon(true);
                return true;
            } catch (err) { updateCloudIcon(false); return false; }
        }

                updateCloudIcon(false);
            }
        }

                startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop;
                scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop;
            });
            slider.addEventListener('mouseleave', () => { isDown = false; slider.classList.add('cursor-grab'); slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mouseup', () => { isDown = false; slider.classList.add('cursor-grab'); slider.classList.remove('cursor-grabbing'); });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return; 
                e.preventDefault(); 
                const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop;

        }

        function renderAnnualCategoryStats(yearRecords, activeCurrency) {
            const catListDiv = document.getElementById('annual-category-list'), titleSpan = document.getElementById('annual-cat-title'), resetBtn = document.getElementById('btn-reset-annual');
            let targetRecords = yearRecords, displayTotal = 0;
            if (selectedAnnualMonth !== null) { const targetMonthStr = String(selectedAnnualMonth + 1).padStart(2, '0'); targetRecords = yearRecords.filter(r => r.date.substring(5, 7) === targetMonthStr); titleSpan.innerText = `${selectedAnnualMonth + 1} 月統計 (${activeCurrency})`; resetBtn.classList.remove('hidden'); } 
            else { titleSpan.innerText = `全年度統計 (${activeCurrency})`; resetBtn.classList.add('hidden'); }
            targetRecords.forEach(r => { displayTotal += r.amount; }); let catHtml = '';
            for (const mainCat in categoryMap) {
                const subCats = categoryMap[mainCat]; let mainTotal = 0; const subTotals = {};
                if (subCats.length > 0) { subCats.forEach(sub => { const fullCatName = `${mainCat}-${sub}`, amount = targetRecords.filter(r => r.category === fullCatName).reduce((sum, r) => sum + r.amount, 0); subTotals[sub] = amount; mainTotal += amount; }); } 
                else { mainTotal = targetRecords.filter(r => r.category === mainCat).reduce((sum, r) => sum + r.amount, 0); }
                if (mainTotal > 0) {
                    const mainPercentage = displayTotal === 0 ? 0 : Math.round((mainTotal / displayTotal) * 100);
                    catHtml += `<div class="mb-5 bg-gray-50 p-3 rounded-xl border border-gray-100 shadow-sm"><div class="flex justify-between text-sm font-bold text-indigo-900 mb-1 pb-1"><span>${mainCat} <span class="text-xs text-indigo-400 ml-1">(${mainPercentage}%)</span></span><span>${mainTotal.toLocaleString()}</span></div><div class="w-full bg-gray-200 rounded-full h-2 mb-3 shadow-inner"><div class="bg-indigo-500 h-2 rounded-full transition-all duration-500" style="width: ${mainPercentage}%"></div></div>`;
                    if (subCats.length > 0) {
                        catHtml += `<div class="pl-3 space-y-3 border-l-2 border-indigo-100 ml-1">`;
                        subCats.forEach(sub => { const subAmt = subTotals[sub]; if (subAmt > 0) { const subPercentage = displayTotal === 0 ? 0 : ((subAmt / displayTotal) * 100).toFixed(1); catHtml += `<div class="pl-2"><div class="flex justify-between text-xs font-medium text-gray-600 mb-1"><span>${sub} <span class="text-gray-400 ml-1">(${subPercentage}%)</span></span><span>${subAmt.toLocaleString()}</span></div><div class="w-full bg-gray-200 rounded-full h-1.5"><div class="bg-indigo-300 h-1.5 rounded-full transition-all duration-500" style="width: ${subPercentage}%"></div></div></div>`; } });
                        catHtml += `</div>`;
                    }
                    catHtml += `</div>`;
                }
            }
            if(catHtml === '') catHtml = `<div class="text-center text-gray-400 py-6 font-medium">尚無相關紀錄</div>`; catListDiv.innerHTML = catHtml;
        }

        function renderAnnualMonthlyTable(monthlyTotals, activeCurrency) {
            const monthlyTbody = document.getElementById('annual-monthly-tbody'); let monthHtml = ''; const maxMonthExpense = Math.max(...monthlyTotals, 1);
            for (let i = 0; i < 12; i++) { const amount = monthlyTotals[i], widthPercent = Math.round((amount / maxMonthExpense) * 100), isSelected = selectedAnnualMonth === i, bgClass = isSelected ? 'bg-indigo-100/50' : 'hover:bg-gray-50'; monthHtml += `<tr onclick="selectAnnualMonth(${i})" class="cursor-pointer transition-colors ${bgClass}"><td class="px-4 py-3 border-r border-gray-100 font-bold ${isSelected ? 'text-indigo-700' : 'text-gray-600'} w-16 text-center">${i + 1}月</td><td class="px-4 py-3 relative"><div class="absolute inset-y-0 left-0 bg-indigo-50 border-l-4 ${isSelected ? 'border-indigo-600' : 'border-indigo-400'} transition-all duration-500" style="width: ${widthPercent}%; opacity: 0.6; margin-top: 4px; margin-bottom: 4px;"></div><div class="relative z-10 flex justify-end font-medium ${amount > 0 ? (isSelected ? 'text-indigo-900 font-bold' : 'text-indigo-900') : 'text-gray-400'}">${amount.toLocaleString()}</div></td></tr>`; }
            monthlyTbody.innerHTML = monthHtml;
        }

        function selectAnnualMonth(monthIndex) { selectedAnnualMonth = monthIndex; updateAnnualOverview(); }
        function resetAnnualCategory() { selectedAnnualMonth = null; updateAnnualOverview(); }
        function showBackupMessage(msg, isSuccess = true) { const msgDiv = document.getElementById('backup-msg'); msgDiv.innerText = msg; msgDiv.className = `text-center text-sm font-medium transition-opacity duration-300 mt-2 ${isSuccess ? 'text-green-600' : 'text-red-600'}`; msgDiv.style.opacity = '1'; setTimeout(() => { msgDiv.style.opacity = '0'; }, 3000); }
        function exportData() { if (records.length === 0) { showBackupMessage("目前沒有任何紀錄可備份喔！", false); return; } try { const dataStr = JSON.stringify(records), dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr), exportFileDefaultName = `簡易記帳本備份_${getLocalYMD(new Date())}.json`; const linkElement = document.createElement('a'); linkElement.setAttribute('href', dataUri); linkElement.setAttribute('download', exportFileDefaultName); document.body.appendChild(linkElement); linkElement.click(); document.body.removeChild(linkElement); showBackupMessage("已成功匯出備份檔案！", true); } catch (error) { showBackupMessage("匯出失敗，請稍後再試。", false); } }
        function importData(event) { const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = async function(e) { try { const importedRecords = JSON.parse(e.target.result); if (Array.isArray(importedRecords)) { records = importedRecords; records.forEach(r => { if(!r.currency) r.currency = 'TWD'; if(r.category === '餐點') r.category = '餐點-其他'; if(r.category === '交通') r.category = '交通-其他'; }); localStorage.setItem('expenseRecords', JSON.stringify(records)); showBackupMessage("資料已成功還原！", true); updateCurrencyFilterOptions(); updateAnnualOverview(); backgroundSyncUpload(); } else { showBackupMessage("檔案格式不正確，還原失敗。", false); } } catch(err) { showBackupMessage("讀取失敗，請確認檔案是否為正確的備份檔。", false); } event.target.value = ''; }; reader.readAsText(file); }
        window.onload = init;
    </script>
</body>
